name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install Dependencies
      run: npm install --legacy-peer-deps
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build Web Assets
      run: |
        npm run build || true
        npx cap sync || true
    - name: Build Android APK Package
      run: |
        cd android && ./gradlew assembleRelease --no-daemon || cd android && ./gradlew assembleDebug --no-daemon
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: universal-app-apk
        path: android/app/build/outputs/apk/**/app-*.apk
